name: macOS build (unsigned beta)

# Builds a universal macOS .dmg (works on Apple Silicon + Intel) and uploads it
# as a downloadable artifact. The app is UNSIGNED: testers must right-click ->
# Open the first time (Gatekeeper).
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust (universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build universal macOS bundle
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Upload .dmg installer
        uses: actions/upload-artifact@v4
        with:
          name: klyph-macos-dmg
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload .app (zipped)
        uses: actions/upload-artifact@v4
        with:
          name: klyph-macos-app
          path: src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error
